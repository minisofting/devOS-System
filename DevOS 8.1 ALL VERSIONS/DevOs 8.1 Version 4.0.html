<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DevOS 8.1 Cloud Edition - Final</title>
    
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>

    <link rel="stylesheet" href="https://cdn.plyr.io/3.7.8/plyr.css" />
    <script src="https://cdn.plyr.io/3.7.8/plyr.js"></script>

    <style>
        /* --- METRO & MODERN SYSTEM CORE --- */
        * { box-sizing: border-box; margin: 0; padding: 0; user-select: none; font-family: "Segoe UI", sans-serif; }
        body, html { width: 100%; height: 100%; overflow: hidden; background-color: #000; color: #fff; }

        .smooth-fade { animation: systemFade 0.4s cubic-bezier(0.1, 0.9, 0.2, 1) forwards; }
        @keyframes systemFade { from { opacity: 0; transform: scale(1.02); } to { opacity: 1; transform: scale(1); } }

        /* --- OOBE --- */
        #oobe-wizard { position: fixed; top:0; left:0; width:100%; height:100%; background: #0078d7; z-index: 10000; display: flex; flex-direction: column; justify-content: center; padding: 10%; }
        #oobe-wizard h1 { font-weight: 300; font-size: 46px; margin-bottom: 20px; }
        #oobe-blackout { position: fixed; top:0; left:0; width:100%; height:100%; background: #000; z-index: 10001; display: none; align-items: center; justify-content: center; text-align: center; }
        #oobe-msg { font-size: 32px; font-weight: 300; color: #fff; transition: opacity 0.5s ease-in-out; opacity: 0; }

        .metro-input { background: rgba(0,0,0,0.4); border: 2px solid rgba(255,255,255,0.6); padding: 10px 15px; color: #fff; font-size: 16px; width: 100%; max-width: 400px; outline: none; margin-bottom: 15px; }
        .metro-input:focus { border-color: #fff; }
        .metro-btn { background: #1f1f1f; color: #fff; border: 2px solid rgba(255,255,255,0.3); padding: 10px 25px; cursor: pointer; display: inline-block; transition: 0.2s; font-size: 14px; }
        .metro-btn:hover { border-color: #fff; background: #2a2a2a; }
        .metro-btn.blue { background: #0078d7; border-color: rgba(255,255,255,0.4); }

        /* --- СТАРТОВЫЙ ЭКРАН И КОРЗИНА --- */
        #start-screen { position: fixed; top:0; left:0; width:100%; height:100%; background: #0f4c5c; padding: 50px 80px; z-index: 9000; display: none; flex-direction: row; gap: 40px; overflow-x: auto; flex-wrap: wrap; }
        #start-main-zone { display: flex; flex-direction: column; flex: 1; }
        #start-screen h2 { font-weight: 300; font-size: 36px; margin-bottom: 30px; display: flex; align-items: center; gap: 15px; }
        .user-avatar-frame { width: 45px; height: 45px; background: rgba(255,255,255,0.2); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 24px; background-size: cover; background-position: center; }
        
        .tile-grid { display: grid; grid-template-rows: repeat(3, 115px); grid-auto-flow: column; grid-auto-columns: 115px; gap: 12px; margin-bottom: 30px; }
        .tile { background: #0078d7; padding: 12px; position: relative; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: transform 0.1s; user-select: none; }
        .tile:hover { outline: 2px solid rgba(255,255,255,0.6); }
        .tile.wide { grid-column: span 2; justify-content: flex-start; padding-left: 20px; }
        .tile.disabled-app { opacity: 0.4; filter: grayscale(80%); }
        .tile-icon-frame { width: 40px; height: 40px; font-size: 36px; display: flex; align-items: center; justify-content: center; background-size: cover; background-position: center; pointer-events: none; }
        .tile-name { position: absolute; bottom: 8px; left: 12px; font-size: 12px; font-weight: 600; pointer-events: none; }

        /* Зона корзины в Пуске */
        #start-trash-zone { width: 100%; max-width: 600px; height: 60px; border: 2px dashed rgba(255,255,255,0.4); display: flex; align-items: center; justify-content: center; color: rgba(255,255,255,0.6); font-size: 18px; transition: 0.2s; border-radius: 5px; margin-top: auto; }
        #start-trash-zone.drag-over { background: rgba(232, 17, 35, 0.4); border-color: #e81123; color: #fff; }

        #start-news-zone { width: 280px; display: flex; flex-direction: column; padding-top: 78px; }
        .news-panel { background: rgba(0,0,0,0.3); border: 1px solid rgba(255,255,255,0.1); flex: 1; display: flex; flex-direction: column; padding: 15px; overflow-y: auto; }

        /* --- РАБОЧИЙ СТОЛ --- */
        #desktop { width: 100%; height: 100%; background: #0f4c5c; background-size: cover; background-position: center; position: relative; display: none; z-index: 8000; }
        #windows-root { width: 100%; height: calc(100% - 40px); position: relative; overflow: hidden; }
        
        #desktop-icons { position: absolute; top: 0; left: 0; width: 100%; height: 100%; padding: 15px; z-index: 5; pointer-events: none; }
        .desktop-icon { width: 85px; padding: 10px 5px; display: flex; flex-direction: column; align-items: center; text-align: center; color: #fff; text-shadow: 1px 1px 3px #000; cursor: pointer; pointer-events: auto; position: absolute; border: 1px solid transparent; }
        .desktop-icon:hover { background: rgba(255,255,255,0.1); border-color: rgba(255,255,255,0.2); }
        .desktop-icon.selected { background: rgba(0, 120, 215, 0.4); border-color: #0078d7; }
        .desktop-icon-img { width: 45px; height: 45px; font-size: 36px; display: flex; align-items: center; justify-content: center; background-size: cover; margin-bottom: 5px; pointer-events: none; }

        #drag-select-box { position: absolute; background: rgba(0, 120, 215, 0.3); border: 1px solid #0078d7; pointer-events: none; display: none; z-index: 6; }

        /* ОКНА И ПОЛНОЭКРАННЫЙ РЕЖИМ */
        .window { position: absolute; width: 620px; height: 460px; min-width: 320px; min-height: 240px; background: #fff; border: 1px solid #2b2b2b; color: #000; display: none; flex-direction: column; box-shadow: 0 15px 30px rgba(0,0,0,0.3); z-index: 10; resize: both; overflow: hidden; transition: width 0.2s, height 0.2s, top 0.2s, left 0.2s; }
        .window.maximized { top: 0 !important; left: 0 !important; width: 100% !important; height: calc(100% - 40px) !important; resize: none; border: none; }
        
        .window-header { background: #fff; padding: 8px 12px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #e0e0e0; cursor: move; flex-shrink: 0; }
        .window-title-area { display: flex; align-items: center; gap: 8px; font-size: 13px; }
        .window-header-icon { width: 18px; height: 18px; font-size: 14px; display: flex; align-items: center; justify-content: center; background-size: cover; background-position: center; }
        .window-controls button { width: 36px; height: 28px; border: none; background: transparent; cursor: pointer; font-size: 13px; color:#000; }
        .window-controls button:hover { background: #e5e5e5; }
        .window-controls .close-btn:hover { background: #e81123; color: #fff; }
        .window-body { flex: 1; overflow: hidden; display: flex; flex-direction: column; position: relative; background: #fff; }

        /* ТАСКБАР */
        #taskbar { position: absolute; bottom: 0; left: 0; width: 100%; height: 40px; background: rgba(19,19,19,0.9); backdrop-filter: blur(10px); display: flex; justify-content: space-between; align-items: center; z-index: 9999; }
        #start-trigger { width: 50px; height: 100%; border: none; background: transparent; cursor: pointer; display: flex; align-items: center; justify-content: center; }
        #start-trigger:hover { background: rgba(255,255,255,0.1); }
        .logo-win { width: 16px; height: 16px; background: #00adef; transform: skewY(-8deg); }
        #task-tabs-container { flex: 1; display: flex; height: 100%; padding-left: 10px; gap: 5px; }
        .task-tab { display: none; align-items: center; gap: 8px; background: rgba(255,255,255,0.06); padding: 0 15px; height: 100%; font-size: 12px; color:#fff; cursor: pointer; border-bottom: 3px solid transparent; }
        .task-tab.active { background: rgba(255,255,255,0.15); border-bottom-color: #0078d7; }
        .task-tab-icon { width: 16px; height: 16px; background-size: cover; display: flex; align-items: center; justify-content: center; }
        
        #tray-area { display: flex; height: 100%; align-items: center; }
        .tray-icon { padding: 0 10px; height: 100%; display: flex; align-items: center; cursor: pointer; font-size: 16px; transition: 0.1s; color: #fff; }
        .tray-icon:hover { background: rgba(255,255,255,0.1); }
        #tray-clock { padding: 0 15px; font-size: 12px; text-align: right; color:#fff; line-height: 1.3; }

        /* УВЕДОМЛЕНИЯ И ПРОГРЕСС-БАРЫ */
        #notification-center { position: fixed; bottom: 50px; right: 20px; z-index: 10000; display: flex; flex-direction: column; gap: 10px; pointer-events: none; }
        .notification { background: #1f1f1f; border-left: 4px solid #0078d7; color: #fff; padding: 15px; width: 320px; box-shadow: 0 5px 15px rgba(0,0,0,0.5); animation: slideIn 0.3s cubic-bezier(0.1, 0.9, 0.2, 1) forwards; pointer-events: auto; position: relative; }
        .notification.critical { border-left-color: #e81123; }
        @keyframes slideIn { from { transform: translateX(120%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
        
        .progress-box { width: 100%; background: #e0e0e0; height: 12px; margin-top: 10px; overflow: hidden; border-radius: 2px; }
        .progress-fill { width: 0%; height: 100%; background: #0078d7; transition: width 0.2s linear; }

        #history-panel { position: absolute; bottom: 45px; right: 10px; width: 320px; max-height: 400px; background: #1f1f1f; border: 1px solid #333; display: none; flex-direction: column; z-index: 10000; color: #fff; box-shadow: 0 5px 15px rgba(0,0,0,0.5); overflow-y: auto; }
        .history-item { padding: 12px; border-bottom: 1px solid #333; font-size: 12px; }
        .history-item strong { color: #00adef; display: block; margin-bottom: 3px; }

        #context-menu { position: absolute; background: #f2f2f2; color: #000; border: 1px solid #ccc; box-shadow: 2px 2px 10px rgba(0,0,0,0.3); z-index: 11000; display: none; flex-direction: column; min-width: 190px; font-size: 13px; padding: 2px 0; }
        .context-item { padding: 8px 15px; cursor: pointer; transition: 0.1s; }
        .context-item:hover { background: #0078d7; color: #fff; }

        #volume-popup { position: absolute; bottom: 45px; right: 120px; background: #1f1f1f; border: 1px solid #333; padding: 15px; display: none; z-index: 10000; color: #fff; box-shadow: 0 5px 15px rgba(0,0,0,0.5); }

        /* ПРИЛОЖЕНИЯ */
        .scroller-body { padding: 15px; display: flex; flex-direction: column; gap: 15px; overflow-y: auto; height: 100%; color:#000; }
        .config-block { border-bottom: 1px solid #eaeaea; padding-bottom: 12px; }
        .config-block label { display: block; font-size: 13px; font-weight: 600; margin-bottom: 6px; color: #333; }
        .wall-preview-container { display: flex; gap: 10px; margin-top: 5px; }
        .wall-preview { width: 60px; height: 40px; background-size: cover; background-position: center; border: 2px solid #ccc; cursor: pointer; }
        
        .chat-container { display: flex; flex-direction: column; height: 100%; background: #f4f4f4; }
        .chat-messages { flex: 1; padding: 15px; overflow-y: auto; display: flex; flex-direction: column; gap: 8px; }
        .chat-bubble { background: #fff; border: 1px solid #ddd; padding: 8px 12px; max-width: 80%; width: max-content; font-size: 13px; }
        .chat-bubble .author { font-weight: bold; font-size: 11px; color: #0078d7; margin-bottom: 2px; }
        .chat-input-area { display: flex; padding: 10px; background: #fff; border-top: 1px solid #ddd; gap: 8px; }

        .store-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 15px; padding: 15px; overflow-y: auto; flex: 1; }
        .store-card { background: #f4f4f4; border: 1px solid #e0e0e0; padding: 15px; display: flex; flex-direction: column; align-items: center; text-align: center; gap: 6px; color:#000; }
        .store-card-icon { width: 48px; height: 48px; font-size: 40px; display: flex; align-items: center; justify-content: center; background-size: cover; background-position: center; }
        .store-desc { font-size: 11px; color: #666; height: 32px; overflow: hidden; margin-top: 4px; }
        .rating-stars { font-size: 16px; margin-bottom: 5px; display: flex; gap: 2px; }
    </style>
</head>
<body>

    <div id="oobe-wizard">
        <h1>Персонализация DevOS 8.1</h1>
        <p style="margin-bottom: 10px;">Придумайте имя пользователя:</p>
        <input type="text" id="oobe-username" class="metro-input" value="ZipTeamDev">
        <p style="margin-bottom: 10px;">Прямой URL обоев (необязательно):</p>
        <input type="text" id="oobe-wallpaper" class="metro-input" value="https://images.wallpaperscraft.ru/image/single/reka_zakat_derevia_1601036_1280x720.jpg">
        <br>
        <div><button class="metro-btn blue" onclick="registerNewCloudAccount()">Запуск системы</button></div>
    </div>

    <div id="oobe-blackout"><div id="oobe-msg">Привет</div></div>

    <div id="start-screen" class="smooth-fade">
        <div id="start-main-zone">
            <h2 id="tiles-header"><div id="user-avatar" class="user-avatar-frame">👤</div> <span id="user-title-name">Пуск</span></h2>
            <div class="tile-grid" id="start-tiles-root"></div>
            
            <div id="start-trash-zone">🗑️ Перетащите программу сюда для удаления</div>
        </div>
        
        <div id="start-news-zone">
            <h3 style="font-weight: 300; margin-bottom: 15px; font-size: 20px;">⚡ Новости DevOS</h3>
            <div class="news-panel" id="news-container">
                <p style="font-size:12px; color:rgba(255,255,255,0.5)">Синхронизация...</p>
            </div>
        </div>
    </div>

    <div id="desktop">
        <div id="drag-select-box"></div>
        <div id="windows-root"><div id="desktop-icons"></div></div>
        
        <div id="notification-center"></div>
        <div id="context-menu"></div>
        
        <div id="history-panel">
            <div style="padding:15px; font-weight:bold; border-bottom:1px solid #333; display:flex; justify-content:space-between;">
                Уведомления <span style="font-weight:normal; font-size:12px; cursor:pointer; color:#888;" onclick="clearHistory()">Очистить</span>
            </div>
            <div id="history-list"></div>
        </div>

        <div id="volume-popup">
            <div style="font-size:12px; margin-bottom:10px; display:flex; justify-content:space-between;">
                <span>Громкость</span> <span id="volume-indicator">100%</span>
            </div>
            <input type="range" id="sys-volume" min="0" max="100" value="100" style="width: 160px;">
        </div>

        <div id="taskbar">
            <button id="start-trigger" onclick="toggleStart()"><div class="logo-win"></div></button>
            <div id="task-tabs-container"></div>
            <div id="tray-area">
                <div class="tray-icon" onclick="toggleVolume()" id="tray-vol-icon">🔊</div>
                <div class="tray-icon" onclick="toggleHistory()" id="tray-bell-icon">🔔</div>
                <div id="tray-clock">00:00<br>17.06.2026</div>
            </div>
        </div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyAqrQWMrxEq2L5ACINr0JK9iNPZ4MgZUlU",
            authDomain: "devos-81.firebaseapp.com",
            projectId: "devos-81",
            storageBucket: "devos-81.firebasestorage.app",
            messagingSenderId: "146842923356",
            appId: "1:146842923356:web:2967d32c41040f51729199"
        };
        
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        let state = {
            userId: localStorage.getItem('devos_uid') || "",
            username: "ZipTeamDev",
            avatar: "👤",
            wallpaper: "https://images.wallpaperscraft.ru/image/single/reka_zakat_derevia_1601036_1280x720.jpg",
            icons: { explorer: '📂', paint: '🎨', player: '📻', store: '🛍️', messenger: '💬', account: '👤', settings: '⚙️', updater: '🔄', gallery: '🖼️' },
            installedAppIds: ['explorer', 'paint', 'player', 'store', 'messenger', 'account', 'settings', 'updater', 'gallery'],
            desktopApps: ['explorer', 'store', 'updater'],
            disabledAppIds: [],
            iconPositions: {}
        };

        const coreRegistry = {
            explorer: { name: 'Проводник', color: '#0078d7', icon: '📂', init: initExplorer },
            paint: { name: 'Paint Pro', color: '#e3a21a', icon: '🎨', init: initPaint },
            player: { name: 'Медиа Плеер', color: '#9f00a7', icon: '📻', init: initPlayer },
            store: { name: 'Dev Store', color: '#008a00', icon: '🛍️', init: initStore },
            messenger: { name: 'Dev Messenger', color: '#1177bb', icon: '💬', init: initMessenger },
            account: { name: 'Учетная запись', color: '#d24726', icon: '👤', init: initAccountApp },
            settings: { name: 'Настройки', color: '#68217a', icon: '⚙️', init: initSettings },
            updater: { name: 'Центр обновлений', color: '#005a9e', icon: '🔄', init: initUpdater },
            gallery: { name: 'Галерея', color: '#ffb900', icon: '🖼️', init: initGallery }
        };

        let cloudAppsCache = [];
        let zIndex = 100;
        let globalVolume = 1;
        let plyrInstances = [];
        let osEolWarned = false;

        window.onload = () => {
            if (state.userId) { document.getElementById('oobe-wizard').style.display = 'none'; syncWithCloudAccount(state.userId, true); }
            listenGlobalCloudStore(); listenSystemNews(); setupSystemEvents(); setupDragSelection(); setupTrashZone();
        };

        // --- EOL УВЕДОМЛЕНИЕ ---
        function triggerEOLWarning() {
            if(osEolWarned) return;
            osEolWarned = true;
            setTimeout(() => {
                showNotification('⚠️ Конец поддержки', 'DevOS 8.1 устаревает! Откройте Центр Обновлений для перехода на DevOS 9.0 (Zip Team Core).', true);
            }, 5000);
        }

        // --- КОРЗИНА И ПЕРЕТАСКИВАНИЕ ---
        function setupTrashZone() {
            const trash = document.getElementById('start-trash-zone');
            trash.addEventListener('dragover', (e) => { e.preventDefault(); trash.classList.add('drag-over'); });
            trash.addEventListener('dragleave', (e) => { trash.classList.remove('drag-over'); });
            trash.addEventListener('drop', (e) => {
                e.preventDefault(); trash.classList.remove('drag-over');
                const appId = e.dataTransfer.getData('text/plain');
                if(appId && state.installedAppIds.includes(appId)) {
                    if(confirm('Удалить программу ' + appId + '?')) uninstallApp(appId);
                }
            });
        }

        function listenSystemNews() {
            db.collection('system_news').orderBy('timestamp', 'desc').limit(5).onSnapshot(snapshot => {
                const container = document.getElementById('news-container'); if(!container) return;
                container.innerHTML = '';
                if(snapshot.empty) { container.innerHTML = '<p style="font-size:11px; color:rgba(255,255,255,0.4)">Нет новостей от серверов Zip Team.</p>'; return; }
                snapshot.forEach(doc => {
                    let news = doc.data();
                    container.innerHTML += `<div style="background:rgba(255,255,255,0.06); padding:8px; border-left:2px solid #0078d7; margin-bottom:8px; font-size:12px;"><strong style="color:#00adef; display:block; margin-bottom:2px;">${escapeHtml(news.title || '')}</strong><span style="color:#eee;">${escapeHtml(news.text || '')}</span></div>`;
                });
            });
        }

        function setupSystemEvents() {
            document.addEventListener('contextmenu', (e) => {
                const menu = document.getElementById('context-menu');
                const tile = e.target.closest('.tile');
                if (tile && tile.getAttribute('data-appid')) {
                    e.preventDefault(); menu.style.display = 'flex'; menu.style.left = e.pageX + 'px'; menu.style.top = e.pageY + 'px';
                    const appId = tile.getAttribute('data-appid'); const isDisabled = state.disabledAppIds.includes(appId);
                    menu.innerHTML = `<div class="context-item" onclick="addToDesktop('${appId}')">📌 На рабочий стол</div><div class="context-item" onclick="toggleDisableApp('${appId}')">${isDisabled ? '🟢 Включить' : '🚫 Отключить'}</div><div class="context-item" style="color:#e81123;" onclick="uninstallApp('${appId}')">❌ Удалить</div>`;
                    return;
                }
                if (e.target.closest('#windows-root') && !e.target.closest('.desktop-icon') && !e.target.closest('.window')) {
                    e.preventDefault(); menu.style.display = 'flex'; menu.style.left = e.pageX + 'px'; menu.style.top = e.pageY + 'px';
                    menu.innerHTML = `<div class="context-item" onclick="showNotification('Система', 'Рабочий стол обновлен'); clearDesktopSelection();">🔄 Обновить</div><div class="context-item" onclick="launchApp('settings')">⚙️ Параметры</div>`;
                }
            });

            document.addEventListener('click', (e) => { 
                if(!e.target.closest('#context-menu')) document.getElementById('context-menu').style.display = 'none'; 
                if(!e.target.closest('#volume-popup') && !e.target.closest('#tray-vol-icon')) document.getElementById('volume-popup').style.display = 'none';
                if(!e.target.closest('#history-panel') && !e.target.closest('#tray-bell-icon')) document.getElementById('history-panel').style.display = 'none';
            });

            document.getElementById('sys-volume').addEventListener('input', (e) => {
                const val = e.target.value; document.getElementById('volume-indicator').innerText = val + '%'; globalVolume = val / 100;
                const volIcon = document.getElementById('tray-vol-icon');
                if(val == 0) volIcon.innerText = '🔇'; else if(val < 50) volIcon.innerText = '🔉'; else volIcon.innerText = '🔊';
                document.querySelectorAll('audio, video').forEach(el => el.volume = globalVolume); plyrInstances.forEach(p => p.volume = globalVolume);
            });

            const tilesRoot = document.getElementById('start-tiles-root');
            let draggedTile = null;
            tilesRoot.addEventListener('dragstart', (e) => { if(e.target.classList.contains('tile') && !e.target.classList.contains('wide')) { draggedTile = e.target; e.dataTransfer.setData('text/plain', e.target.getAttribute('data-appid')); } });
            tilesRoot.addEventListener('dragover', (e) => { e.preventDefault(); });
            tilesRoot.addEventListener('drop', (e) => {
                e.preventDefault(); const targetTile = e.target.closest('.tile');
                if(targetTile && draggedTile && targetTile !== draggedTile && !targetTile.classList.contains('wide')) {
                    const id1 = draggedTile.getAttribute('data-appid'); const id2 = targetTile.getAttribute('data-appid');
                    let idx1 = state.installedAppIds.indexOf(id1); let idx2 = state.installedAppIds.indexOf(id2);
                    if(idx1 !== -1 && idx2 !== -1) { state.installedAppIds[idx1] = id2; state.installedAppIds[idx2] = id1; pushCurrentStateToCloud(); buildStartTiles(); }
                }
            });

        function setupDragSelection() { /* Логика выделения */
            const root = document.getElementById('windows-root'); const box = document.getElementById('drag-select-box'); let isSelecting = false; let startX = 0, startY = 0;
            root.addEventListener('mousedown', (e) => { if(e.target.closest('.desktop-icon') || e.target.closest('.window') || e.button !== 0) return; isSelecting = true; startX = e.pageX; startY = e.pageY - root.offsetTop; box.style.left = startX + 'px'; box.style.top = startY + 'px'; box.style.width = '0px'; box.style.height = '0px'; box.style.display = 'block'; clearDesktopSelection(); });
            document.addEventListener('mousemove', (e) => { if (!isSelecting) return; let currentX = e.pageX; let currentY = e.pageY - root.offsetTop; box.style.left = Math.min(startX, currentX) + 'px'; box.style.top = Math.min(startY, currentY) + 'px'; box.style.width = Math.abs(startX - currentX) + 'px'; box.style.height = Math.abs(startY - currentY) + 'px'; document.querySelectorAll('.desktop-icon').forEach(icon => { let rA = box.getBoundingClientRect(); let rB = icon.getBoundingClientRect(); let intersects = !(rA.right < rB.left || rA.left > rB.right || rA.bottom < rB.top || rA.top > rB.bottom); if(intersects) icon.classList.add('selected'); else icon.classList.remove('selected'); }); });
            document.addEventListener('mouseup', () => { if(isSelecting) { isSelecting = false; box.style.display = 'none'; } });
        }
        function clearDesktopSelection() { document.querySelectorAll('.desktop-icon').forEach(i => i.classList.remove('selected')); }

        function makeDesktopIconDraggable(element, appId) {
            let dX = 0, dY = 0, startX = 0, startY = 0;
            element.onmousedown = function(e) { if(e.button !== 0) return; e.preventDefault(); startX = e.clientX; startY = e.clientY; document.onmousemove = dragMove; document.onmouseup = dragEnd; clearDesktopSelection(); element.classList.add('selected'); }
            function dragMove(e) { dX = startX - e.clientX; dY = startY - e.clientY; startX = e.clientX; startY = e.clientY; element.style.top = (element.offsetTop - dY) + "px"; element.style.left = (element.offsetLeft - dX) + "px"; }
            function dragEnd() { document.onmousemove = null; document.onmouseup = null; state.iconPositions[appId] = { x: element.style.left, y: element.style.top }; pushCurrentStateToCloud(); }
        }

        function addToDesktop(appId) { if(!state.desktopApps.includes(appId)) { state.desktopApps.push(appId); pushCurrentStateToCloud(); renderDesktopIcons(); showNotification('Ярлык', 'Добавлено на рабочий стол.'); } }

        // --- УПРАВЛЕНИЕ ОКНАМИ ---

        function closeWindow(id) { document.getElementById(`win-${id}`).remove(); document.getElementById(`tab-${id}`).remove(); }

        let dragTarget = null, offX = 0, offY = 0;

        function initExplorer(appId) { document.getElementById(`winbody-${appId}`).innerHTML = `<div style="padding:20px; font-size:13px; color:#333;"><b>Этот компьютер</b><br><br>📁 System32<br>📁 Изображения<br>📁 Zip Team Projects</div>`; }
        function initPaint(appId) { const b = document.getElementById(`winbody-${appId}`); b.innerHTML = `<div style="background:#f4f4f4; padding:5px; display:flex; gap:10px; border-bottom:1px solid #ddd;"><input type="color" id="pt-c-${appId}" value="#0078d7"><input type="range" id="pt-w-${appId}" min="1" max="20" value="5"></div><canvas id="canv-${appId}" style="flex:1; background:#fff; cursor:crosshair;"></canvas>`; setTimeout(() => { const c = document.getElementById(`canv-${appId}`); const ctx = c.getContext('2d'); c.width = c.parentElement.clientWidth; c.height = c.parentElement.clientHeight - 40; let dr = false; c.onmousedown = (e) => { dr = true; ctx.beginPath(); ctx.moveTo(e.offsetX, e.offsetY); }; c.onmousemove = (e) => { if(!dr) return; ctx.lineTo(e.offsetX, e.offsetY); ctx.strokeStyle = document.getElementById(`pt-c-${appId}`).value; ctx.lineWidth = document.getElementById(`pt-w-${appId}`).value; ctx.lineCap = "round"; ctx.stroke(); }; c.onmouseup = () => dr = false; }, 50); }

        // --- ЦЕНТР ОБНОВЛЕНИЙ И DEVOS 9.0 ---
        function initAccountApp(appId) { document.getElementById(`winbody-${appId}`).innerHTML = `<div class="scroller-body"><h3 style="color:#d24726; font-weight:300;">Паспорт терминала</h3><div class="config-block"><label>Account ID:</label><input type="text" class="metro-input" style="color:#000; border-color:#ccc; max-width:100%;" value="${state.userId}" readonly></div></div>`; }
        function initGallery(appId) { document.getElementById(`winbody-${appId}`).innerHTML = `<div style="padding:15px; height:100%; display:flex; flex-direction:column; background:#111;"><div style="margin-bottom:15px; display:flex; gap:10px;"><input type="text" id="gal-url" class="metro-input" style="flex:1; margin:0; padding:6px 10px; font-size:13px;" placeholder="URL картинки"><button class="metro-btn blue" onclick="addImgToGallery()">Добавить</button></div><div id="gal-grid" style="display:flex; flex-wrap:wrap; gap:10px; overflow-y:auto; align-content:flex-start; flex:1;"><img src="${state.wallpaper}" style="width:120px; height:120px; object-fit:cover; border:2px solid #333;"></div></div>`; }
        function addImgToGallery() { let u = document.getElementById('gal-url').value; if(u) { document.getElementById('gal-grid').innerHTML += `<img src="${u}" style="width:120px; height:120px; object-fit:cover; border:2px solid #333;">`; document.getElementById('gal-url').value = ''; } }

        function initUpdater(appId) {
            document.getElementById(`winbody-${appId}`).innerHTML = `
                <div style="padding:30px; color:#000; text-align:center; display:flex; flex-direction:column; align-items:center; height:100%; justify-content:center;">
                    <div style="font-size:48px; color:#e81123;">⚠️</div>
                    <h2 style="font-weight:300; margin-top:10px;">DevOS 8.1 устарела</h2>
                    <p style="font-size:13px; color:#666; margin: 15px 0;">Доступно критическое обновление системы.</p>
                    <button class="metro-btn blue" style="padding: 15px 30px; font-size:16px; background:#e81123; border-color:#e81123;" onclick="upgradeToOS9()">Установить DevOS 9.0</button>
                    <div id="upd-status" style="margin-top:20px; font-size:12px; color:#005a9e; width: 80%;"></div>
                </div>
            `;
        }

        function upgradeToOS9() {
            const st = document.getElementById('upd-status');
            st.innerHTML = `Скачивание ядра DevOS 9.0... <div class="progress-box" style="margin-top:5px;"><div class="progress-fill" style="width:0%" id="upd-prog-fill"></div></div>`;
            let p = 0;
            let int = setInterval(() => {
                p += 8; document.getElementById('upd-prog-fill').style.width = p + '%';
                if(p >= 100) {
                    clearInterval(int);
                    st.innerHTML = "Запрос кода обновления из Firestore...";
                    
                    db.collection('system_updates').doc('v9').get().then(doc => {
                        if(doc.exists && doc.data().html_code) {
                            // Заменяем код страницы если он есть в базе!
                            document.open(); document.write(doc.data().html_code); document.close();
                        } else {
                            // Фолбэк, если в базе нет кода
                            document.body.innerHTML = "<div style='display:flex;flex-direction:column;height:100vh;width:100vw;background:#000;color:#00ff00;align-items:center;justify-content:center;font-family:monospace;font-size:24px;'>ZIP TEAM CLOUD<br><br>DEVOS 9.0 CORE INSTALLED SUCCESSFULLY.<br>REBOOT REQUIRED.</div>";
                        }
                    }).catch(() => {
                        document.body.innerHTML = "<div style='display:flex;height:100vh;width:100vw;background:#000;color:#00ff00;align-items:center;justify-content:center;font-family:monospace;font-size:24px;'>DEVOS 9.0 MIGRATION TRIGGERED.</div>";
                    });
                }
            }, 300);
        }

        function escapeHtml(text) { return text.replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;"); }
        setInterval(() => { const d = new Date(); document.getElementById('tray-clock').innerHTML = d.getHours().toString().padStart(2,'0') + ':' + d.getMinutes().toString().padStart(2,'0') + `<br><span style="font-size:10px;">17.06.2026</span>`; }, 1000);
    </script>
</body>
</html>
